services:
  chatbot-api:
    build: .
    container_name: heptagon-chatbot-api
    restart: unless-stopped
    mem_limit: 512m
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - USAGE_STORE_PATH=/app/data/usage.json
      - CLIENT_ROUTING_STORE_PATH=/app/data/client-routing.json
      # DATABASE_URL is loaded from .env via env_file (use global-postgres-db:5432 on proxy-network)
    volumes:
      - ./data:/app/data
    ports:
      - "${PORT}:${PORT}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - proxy-network

networks:
  proxy-network:
    external: true
