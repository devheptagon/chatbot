<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot Demo</title>
    <link rel="stylesheet" href="widget.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #eff6ff 0%, #f8fafc 100%);
        color: #0f172a;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 64px 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }

      p {
        line-height: 1.6;
        color: #475569;
      }

      code {
        background: #e2e8f0;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Chatbot Demo</h1>
      <p>
        This page demonstrates the embeddable chat widget. Open the chat button in the
        bottom corner to talk with the assistant.
      </p>
      <p>
        Widget settings come from <code>chatbot-config.js</code>, generated from
        <code>.env</code> on the server.
      </p>
    </main>

    <script src="chatbot-config.js"></script>
    <script src="demo-config.js"></script>
    <script src="widget.js"></script>
  </body>
</html>
